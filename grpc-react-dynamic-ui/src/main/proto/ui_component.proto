syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.jinloes.grpc.ui.proto";
option java_outer_classname = "UiComponentProto";

package uiComponent;

service UiComponentService {
  rpc GetComponents (ComponentRequest) returns (ComponentsResponse);
}

message ComponentRequest {
  repeated string componentIds = 1;
}

message ComponentsResponse {
  repeated ComponentResponse components = 1;
}

message EqualsOperator {
  string field = 1;
  string value = 2;
}

message NotEqualsOperator {
  string field = 1;
  string value = 2;
}

message InOperator {
  string field = 1;
  repeated string values = 2;
}

message NotInOperator {
  string field = 1;
  repeated string values = 2;
}

message Condition {
  oneof operator {
    EqualsOperator equals = 1;
    NotEqualsOperator notEquals = 2;
    InOperator in = 3;
    NotInOperator notIn = 4;
  }
}

message Field {
  string name = 1;
  string label = 2;
  string type = 3;
  repeated string values = 4;
  bool required = 5;
  optional Condition visible = 6;
}

message ComponentResponse {
  string componentId = 1;
  string type = 2;
  repeated Field fields = 3;
}