spring.application.name=jobrunr-example
server.port=8080

# H2 in-memory database for job storage
spring.datasource.url=jdbc:h2:mem:jobrunrdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JobRunr: enable background job processing server
org.jobrunr.background-job-server.enabled=true
org.jobrunr.background-job-server.worker-count=4

# JobRunr dashboard on a separate port so it doesn't conflict with the API
org.jobrunr.dashboard.enabled=true
org.jobrunr.dashboard.port=8000