spring:
  application:
    name: grpc-generic-filters-test

grpc:
  server:
    in-process-name: test
    # Disable the real Netty server so tests run fully in-process
    port: -1
  client:
    inProcess:
      address: in-process:test
    grpc-filter-server:
      address: static://localhost:9092
      negotiation-type: plaintext