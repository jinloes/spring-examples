apiVersion: v1
kind: Service
metadata:
  name: kubernetes-discovery
spec:
  selector:
    app: kubernetes-discovery
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP
# K8s creates a DNS record: kubernetes-discovery.default.svc.cluster.local
# and injects KUBERNETES_DISCOVERY_SERVICE_HOST / KUBERNETES_DISCOVERY_SERVICE_PORT
# into every pod in the same namespace.
