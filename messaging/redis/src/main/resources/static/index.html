<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Redis WebSocket Demo</title>
  <script src="/webjars/sockjs-client/sockjs.min.js"></script>
  <script src="/webjars/stomp-websocket/stomp.min.js"></script>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 0 16px; }
    #messages { border: 1px solid #ccc; height: 300px; overflow-y: auto; padding: 8px; margin-bottom: 12px; }
    .message { padding: 4px 0; border-bottom: 1px solid #eee; }
    input { width: 70%; padding: 8px; }
    button { padding: 8px 16px; }
    #status { color: #888; font-size: 0.9em; margin-bottom: 8px; }
  </style>
</head>
<body>
  <h2>Redis Pub/Sub → WebSocket Demo</h2>
  <p id="status">Connecting…</p>
  <div id="messages"></div>
  <input id="input" type="text" placeholder="Type a message" />
  <button onclick="sendMessage()">Send</button>

  <script>
    const socket = new SockJS('/ws');
    const stompClient = Stomp.over(socket);

    stompClient.connect({}, () => {
      document.getElementById('status').textContent = 'Connected';
      stompClient.subscribe('/topic/messages', (frame) => {
        const div = document.createElement('div');
        div.className = 'message';
        div.textContent = frame.body;
        document.getElementById('messages').appendChild(div);
      });
    });

    function sendMessage() {
      const input = document.getElementById('input');
      const message = input.value.trim();
      if (!message) return;
      fetch('/api/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: message
      });
      input.value = '';
    }

    document.getElementById('input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') sendMessage();
    });
  </script>
</body>
</html>
