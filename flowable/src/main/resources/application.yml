spring:
  datasource:
    url: jdbc:h2:mem:flowabledb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ''
  h2:
    console:
      enabled: true
      path: /h2-console

flowable:
  # Auto-create / update Flowable schema tables on startup
  database-schema-update: true

logging:
  level:
    # Reduce Flowable engine noise; flip to DEBUG to see process execution traces
    org.flowable: WARN